<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- The ONE rainbow horizontal rule -->
    <linearGradient id="rainbow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"    stop-color="#e23b3b"/>
      <stop offset="0.2"  stop-color="#ef8a25"/>
      <stop offset="0.4"  stop-color="#e8c93a"/>
      <stop offset="0.6"  stop-color="#3aa657"/>
      <stop offset="0.8"  stop-color="#2f6fb0"/>
      <stop offset="1"    stop-color="#7e4ba6"/>
    </linearGradient>
    <!-- Soft parchment backing so the off-white never reads as flat white -->
    <radialGradient id="parchment" cx="0.5" cy="0.42" r="0.85">
      <stop offset="0"   stop-color="#fbf6e7"/>
      <stop offset="0.7" stop-color="#f4ecd6"/>
      <stop offset="1"   stop-color="#ece1c4"/>
    </radialGradient>
  </defs>

  <!-- Parchment background -->
  <rect x="0" y="0" width="1200" height="630" fill="url(#parchment)"/>

  <!-- Quiet inner keyline, period-correct beveled frame, well inside safe area -->
  <rect x="62" y="52" width="1076" height="526" fill="none" stroke="#cbbd96" stroke-width="2"/>
  <rect x="69" y="59" width="1062" height="512" fill="none" stroke="#e7dcbc" stroke-width="1"/>

  <!-- Small "Welcome to the homepage of" greeting, classic GeoCities phrasing -->
  <text x="600" y="150" text-anchor="middle"
        font-family="Times New Roman, Georgia, serif" font-style="italic"
        font-size="34" fill="#6b5d3a">Welcome to the homepage of</text>

  <!-- DOMINANT element: the name. 13 chars at 132px ~ well under 1040px wide. -->
  <text x="600" y="290" text-anchor="middle"
        font-family="Times New Roman, Georgia, serif" font-weight="bold"
        font-size="132" fill="#1d2b4d">Cosmo Santoni</text>

  <!-- The single rainbow horizontal rule -->
  <rect x="300" y="338" width="600" height="9" rx="4.5" fill="url(#rainbow)"/>

  <!-- Tagline: ONE choice -->
  <text x="600" y="408" text-anchor="middle"
        font-family="Times New Roman, Georgia, serif"
        font-size="40" fill="#3a3320">Machine Learning Research</text>

  <!-- Supporting touch 1: two blue underlined "links" with tiny star bullets -->
  <g font-family="Times New Roman, Georgia, serif" font-size="30">
    <!-- star bullet -->
    <text x="386" y="482" text-anchor="middle" fill="#c79a16" font-size="26">&#9733;</text>
    <text x="408" y="482" fill="#1a3fb0" text-decoration="underline">Research</text>
    <line x1="408" y1="489" x2="528" y2="489" stroke="#1a3fb0" stroke-width="1.5"/>

    <text x="630" y="482" text-anchor="middle" fill="#c79a16" font-size="26">&#9733;</text>
    <text x="652" y="482" fill="#1a3fb0" text-decoration="underline">About Me</text>
    <line x1="652" y1="489" x2="784" y2="489" stroke="#1a3fb0" stroke-width="1.5"/>
  </g>

  <!-- Supporting touch 2: footer with copyright, URL and last-updated -->
  <text x="600" y="552" text-anchor="middle"
        font-family="Times New Roman, Georgia, serif" font-size="24" fill="#7a6c46">&#169; 1997 &#183; cosmosantoni.com</text>
</svg>
